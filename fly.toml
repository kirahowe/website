# Fly.io config. All app config lives in config.edn (including
# :content-git-url — the content repo is public); there are no secrets
# and no env vars. Before first deploy:
#   1. change `app` to your (globally unique) app name
#   2. fly deploy
app = "kirahowe-website"
primary_region = "yul"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

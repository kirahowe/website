# Fly.io config. Everything non-secret lives in config.edn (including
# :content-git-url — the content repo is public). Before first deploy:
#   1. change `app` to your (globally unique) app name
#   2. optional but recommended: fly secrets set ADMIN_TOKEN=$(openssl rand -hex 16)
#      (enables remote draft previews + the instant-reindex webhook)
#   3. fly deploy
app = "kirahowe-www"
primary_region = "yul"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

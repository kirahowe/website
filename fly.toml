# Fly.io config. Before first deploy:
#   1. change `app` to your (globally unique) app name
#   2. fly secrets set ADMIN_TOKEN=$(openssl rand -hex 16)
#   3. fly secrets set CONTENT_GIT_URL=https://x-access-token:<PAT>@github.com/<you>/<content-repo>.git
#      (plain https URL works for a public content repo)
#   4. fly deploy
app = "kirahowe-www"
primary_region = "yul"

[build]

[env]
  # Container-level overrides only — everything else lives in config.edn.
  # /content is where the content repo gets cloned inside the machine
  # (ephemeral is fine: re-cloned on boot, pulled every :content-sync-seconds).
  CONTENT_PATH = "/content"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

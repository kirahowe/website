# Fly.io config. Before first deploy:
#   1. change `app` to your (globally unique) app name
#   2. fly secrets set ADMIN_TOKEN=$(openssl rand -hex 16)
#   3. fly secrets set CONTENT_GIT_URL=https://x-access-token:<PAT>@github.com/<you>/<content-repo>.git
#      (plain https URL works for a public content repo)
#   4. fly deploy
app = "kirahowe-www"
primary_region = "yul"

[build]

[env]
  PORT = "8080"
  # Where the content repo gets cloned inside the machine (ephemeral is
  # fine — it's re-cloned on boot and pulled every CONTENT_SYNC_SECONDS).
  CONTENT_PATH = "/content"
  CONTENT_SYNC_SECONDS = "300"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
